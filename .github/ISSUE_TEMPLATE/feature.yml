name: Feature request
description: Suggest one focused improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep the request practical and focused. Use synthetic examples only. Do not include real private or workplace data.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain the sharing or redaction problem before describing the feature.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Suggested change
      description: What is the smallest useful version?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Synthetic example
      description: Show fake input and the output you would expect.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I used synthetic data only and removed private or workplace information.
          required: true
